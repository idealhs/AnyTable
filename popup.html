<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnyTable</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <main class="popup-shell" aria-labelledby="appTitle">
        <header class="popup-header">
            <div class="brand-block">
                <div class="brand-mark" aria-hidden="true">
                    <img class="brand-mark__image" src="icons/anytable-96.png" alt="">
                </div>
                <div class="brand-copy">
                    <h1 id="appTitle" class="brand-copy__title" data-i18n="popup.title">AnyTable</h1>
                </div>
            </div>

            <div class="locale-picker">
                <button
                    id="localeTrigger"
                    class="locale-trigger"
                    type="button"
                    aria-haspopup="listbox"
                    aria-expanded="false"
                    aria-controls="localeMenu"
                >
                    <span class="locale-trigger__icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M4 12C4 7.58 7.58 4 12 4C16.42 4 20 7.58 20 12C20 16.42 16.42 20 12 20C7.58 20 4 16.42 4 12Z"></path>
                            <path d="M4.75 9.5H19.25"></path>
                            <path d="M4.75 14.5H19.25"></path>
                            <path d="M11.95 4.25C10.28 6.27 9.33 9.05 9.33 12C9.33 14.95 10.28 17.73 11.95 19.75"></path>
                            <path d="M12.05 4.25C13.72 6.27 14.67 9.05 14.67 12C14.67 14.95 13.72 17.73 12.05 19.75"></path>
                        </svg>
                    </span>
                    <span id="localeCurrentLabel" class="locale-trigger__label">中</span>
                    <span class="locale-trigger__chevron" aria-hidden="true"></span>
                </button>

                <div
                    id="localeMenu"
                    class="locale-menu"
                    role="listbox"
                    hidden
                >
                    <div class="locale-menu__header">
                        <p class="locale-menu__title" data-i18n="popup.language.label">界面语言</p>
                    </div>
                    <div id="localeMenuList" class="locale-menu__list"></div>
                </div>
            </div>
        </header>

        <section class="panel panel--summary" aria-labelledby="pageSectionTitle">
            <div class="section-bar">
                <h2 id="pageSectionTitle" class="section-title" data-i18n="popup.page.title">页面状态</h2>
                <span id="pageSupportBadge" class="status-chip status-chip--positive">已连接</span>
            </div>

            <div class="page-card">
                <div class="page-card__icon" aria-hidden="true">
                    <img id="pageFavicon" class="page-card__favicon" src="icons/anytable-96.png" alt="">
                </div>

                <div class="page-card__body">
                    <p id="pageHost" class="page-card__host">example.com</p>
                    <p id="pageTitle" class="page-card__title">Current page title</p>
                </div>
            </div>

            <p id="pageStatusDescription" class="page-card__description">已连接到当前页面，可以开始选择并增强表格。</p>

            <div class="action-bar">
                <button id="pickTable" class="action-button action-button--primary" type="button">
                    <span class="action-button__content">
                        <span class="action-button__icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none">
                                <path d="M8.5 5.5H6.5C5.4 5.5 4.5 6.4 4.5 7.5V17.5C4.5 18.6 5.4 19.5 6.5 19.5H16.5C17.6 19.5 18.5 18.6 18.5 17.5V15.5"></path>
                                <path d="M14 5.5H19.5V11"></path>
                                <path d="M10 14.5L19.5 5"></path>
                            </svg>
                        </span>
                        <span class="action-button__label" data-i18n="popup.pickTable">选择表格</span>
                    </span>
                    <span class="action-button__spinner" aria-hidden="true"></span>
                </button>

                <button id="clearSelection" class="action-button action-button--secondary" type="button" disabled>
                    <span class="action-button__content">
                        <span class="action-button__icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none">
                                <path d="M7 7L17 17"></path>
                                <path d="M17 7L7 17"></path>
                                <path d="M5 12C5 8.13 8.13 5 12 5C15.87 5 19 8.13 19 12C19 15.87 15.87 19 12 19C8.13 19 5 15.87 5 12Z"></path>
                            </svg>
                        </span>
                        <span class="action-button__label" data-i18n="popup.clearSelection">清除选择</span>
                    </span>
                    <span class="action-button__spinner" aria-hidden="true"></span>
                </button>
            </div>
        </section>

        <section class="panel panel--settings" aria-labelledby="settingsTitle">
            <div class="section-bar">
                <h2 id="settingsTitle" class="section-title" data-i18n="popup.settings.title">行为偏好</h2>
            </div>

            <div class="settings-list">
                <label class="setting-row" for="autoEnhance">
                    <span class="setting-row__icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M12 4V7"></path>
                            <path d="M12 17V20"></path>
                            <path d="M4 12H7"></path>
                            <path d="M17 12H20"></path>
                            <path d="M6.35 6.35L8.47 8.47"></path>
                            <path d="M15.53 15.53L17.65 17.65"></path>
                            <path d="M17.65 6.35L15.53 8.47"></path>
                            <path d="M8.47 15.53L6.35 17.65"></path>
                            <path d="M12 16C9.79 16 8 14.21 8 12C8 9.79 9.79 8 12 8C14.21 8 16 9.79 16 12C16 14.21 14.21 16 12 16Z"></path>
                        </svg>
                    </span>
                    <span class="setting-row__body">
                        <span class="setting-row__title" data-i18n="popup.autoEnhance.label">自动增强所有表格</span>
                        <span class="setting-row__description" data-i18n="popup.autoEnhance.description">自动增强检测到的所有数据表格</span>
                    </span>
                    <span class="setting-row__meta">
                        <span class="setting-switch">
                            <input type="checkbox" id="autoEnhance">
                            <span class="setting-switch__track"></span>
                        </span>
                    </span>
                </label>

                <label class="setting-row" for="multiColumnSort">
                    <span class="setting-row__icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M8 6V18"></path>
                            <path d="M5.5 8.5L8 6L10.5 8.5"></path>
                            <path d="M16 18V6"></path>
                            <path d="M13.5 15.5L16 18L18.5 15.5"></path>
                        </svg>
                    </span>
                    <span class="setting-row__body">
                        <span class="setting-row__title" data-i18n="popup.multiColumnSort.label">启用多列排序</span>
                        <span class="setting-row__description" data-i18n="popup.multiColumnSort.description">按照点选顺序进行优先级排序</span>
                    </span>
                    <span class="setting-row__meta">
                        <span class="setting-switch">
                            <input type="checkbox" id="multiColumnSort">
                            <span class="setting-switch__track"></span>
                        </span>
                    </span>
                </label>

                <label class="setting-row" for="toolbarDefaultExpanded">
                    <span class="setting-row__icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M5 8H19"></path>
                            <path d="M5 12H19"></path>
                            <path d="M5 16H14"></path>
                            <path d="M17 15L19 17L21 15"></path>
                        </svg>
                    </span>
                    <span class="setting-row__body">
                        <span class="setting-row__title" data-i18n="popup.toolbarDefaultExpanded.label">工具栏默认展开</span>
                        <span class="setting-row__description" data-i18n="popup.toolbarDefaultExpanded.description">自动展开表格右上角的工具集</span>
                    </span>
                    <span class="setting-row__meta">
                        <span class="setting-switch">
                            <input type="checkbox" id="toolbarDefaultExpanded">
                            <span class="setting-switch__track"></span>
                        </span>
                    </span>
                </label>
            </div>
        </section>
    </main>

    <div id="status" class="status-toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="popup.js"></script>
</body>
</html>
